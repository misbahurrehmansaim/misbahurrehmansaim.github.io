  <meta charset="UTF-8">
  <title>Welcome | Misbah</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #58661c, #697524);
      color: white;
      text-align: center;
    }

    .container {
      max-width: 600px;
      padding: 40px;
      background: rgba(250, 250, 250, 0.1);
      border-radius: 20px;
      backdrop-filter: blur(15px);
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 20px;
      font-weight: 700;
    }

    p {
      font-size: 1.1rem;
      margin-bottom: 40px;
      opacity: 0.9;
    }

    .btn {
      padding: 15px 35px;
      font-size: 1.1rem;
      font-weight: 600;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      background: rgb(55, 139, 30);
      color: #2a683f;
      transition: all 0.3s ease;
      text-decoration: none;
      display: inline-block;
    }

    .btn:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      background: #f2f2f2;
    }

    footer {
      margin-top: 30px;
      font-size: 0.9rem;
      opacity: 0.8;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Welcome</h1>
    <p>Click below to explore portfolio.</p>

    <a href="https://misbahurrehmanportfolio.lovable.app/" class="btn">
      Visit My Portfolio
    </a>

    <footer>
      © 2026 Misbah | All Rights Reserved
    </footer>
  </div>

</body>
</html>
